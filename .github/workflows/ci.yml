name: CI/CD

on:
  push:
    branches: [main]

# Allow this workflow to create and delete GitHub releases
permissions:
  contents: write

jobs:
  test-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        id: tests
        run: |
          OUTPUT=$(xcodebuild test \
            -project LittlePup.xcodeproj \
            -scheme LittlePupTests \
            -destination 'platform=macOS' 2>&1)
          echo "$OUTPUT"
          COUNT=$(echo "$OUTPUT" | grep -E "Executed [0-9]+ test" | tail -1 | grep -oE "[0-9]+ tests")
          echo "summary=${COUNT}, 0 failures" >> $GITHUB_OUTPUT

      - name: Build release app
        run: |
          xcodebuild build \
            -project LittlePup.xcodeproj \
            -scheme LittlePup \
            -configuration Release \
            -derivedDataPath build

      - name: Package as .dmg
        run: |
          STAGE=/tmp/LittlePup-dmg
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          # clean copy of the app — no resource forks / extended attrs / ACLs
          ditto --norsrc --noextattr --noacl \
            build/Build/Products/Release/LittlePup.app "$STAGE/LittlePup.app"
          xattr -cr "$STAGE/LittlePup.app"
          # drag-to-install target inside the disk image
          ln -s /Applications "$STAGE/Applications"
          # compressed read-only image
          hdiutil create \
            -volname "LittlePup" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            LittlePup.dmg

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FULL_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          TEST_SUMMARY: ${{ steps.tests.outputs.summary }}
        run: |
          LATEST=$(gh release list \
            --json tagName \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | .[0].tagName // "v0.0.0"')
          MAJOR=$(echo $LATEST | tr -d 'v' | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          BUILD_DATE="$(date -u '+%d %b %Y at %H:%M UTC')"
          SHORT_SHA="${FULL_SHA::7}"
          COMMIT_URL="${SERVER_URL}/${REPOSITORY}/commit/${FULL_SHA}"
          cat > notes.md << NOTES
          ## Download

          Click **LittlePup.dmg** above to download.

          ## Install

          1. Open \`LittlePup.dmg\`
          2. **Drag \`LittlePup.app\` onto the Applications folder** in the window
          3. Launch LittlePup from Applications or Spotlight

          **First launch only:** right-click \`LittlePup\` in Applications → **Open** → **Open** to bypass the unsigned-app warning (macOS remembers it after that). Or run once: \`xattr -dr com.apple.quarantine /Applications/LittlePup.app\`

          ## What's in this build

          - Animated golden retriever in your Dock tile
          - Auto-switches between idle and sleep every ~1 minute
          - Right-click Dock menu: Idle, Sit, Sleep, Walk, Feed, Bark
          - Drop \`food.png\` onto the Dock icon to trigger the eating animation

          ## Requirements

          - macOS 12 Monterey or later
          - Apple Silicon or Intel

          ## Build info

          | | |
          |---|---|
          | **Version** | \`${NEW_VERSION}\` |
          | **Commit** | [${SHORT_SHA}](${COMMIT_URL}) |
          | **Date** | ${BUILD_DATE} |
          | **Tests** | ${TEST_SUMMARY} |
          NOTES
          gh release create "${NEW_VERSION}" LittlePup.dmg \
            --title "LittlePup ${NEW_VERSION}" \
            --notes-file notes.md
